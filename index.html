<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clobe 조회창 — 재무 데이터 뷰어</title>
<style>
  :root {
    --page:#f9f9f7; --surface-1:#fcfcfb; --surface-2:#ffffff;
    --text-primary:#0b0b0b; --text-secondary:#52514e; --text-muted:#898781;
    --gridline:#e1e0d9; --baseline:#c3c2b7; --border:rgba(11,11,11,0.10);
    --series-1:#2a78d6; --series-2:#1baf7a; --series-3:#eda100; --series-6:#e34948;
    --seq-100:#cde2fb; --seq-250:#86b6ef; --good:#006300; --good-mark:#0ca30c;
    --critical:#d03b3b; --warning:#fab219; --accent-soft:rgba(42,120,214,0.10);
    --radius:12px; --sans: system-ui, -apple-system, "Segoe UI", "Malgun Gothic", sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --page:#0d0d0d; --surface-1:#1a1a19; --surface-2:#201f1e;
      --text-primary:#ffffff; --text-secondary:#c3c2b7; --text-muted:#898781;
      --gridline:#2c2c2a; --baseline:#383835; --border:rgba(255,255,255,0.10);
      --series-1:#3987e5; --series-2:#199e70; --series-3:#c98500; --series-6:#e66767;
      --seq-100:#184f95; --seq-250:#2a78d6; --good:#0ca30c; --good-mark:#0ca30c;
      --critical:#e66767; --warning:#fab219; --accent-soft:rgba(57,135,229,0.16);
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { font-family: var(--sans); background: var(--page); color: var(--text-primary); -webkit-font-smoothing: antialiased; font-size: 14px; line-height: 1.5; }
  .app { display: grid; grid-template-columns: 232px 1fr; min-height: 100vh; }

  .sidebar { background: var(--surface-1); border-right: 1px solid var(--border); padding: 20px 14px; display: flex; flex-direction: column; gap: 4px; position: sticky; top: 0; height: 100vh; }
  .brand { display: flex; align-items: center; gap: 10px; padding: 4px 8px 18px; }
  .brand .logo { width: 30px; height: 30px; border-radius: 8px; background: var(--series-1); color: #fff; font-weight: 700; display: grid; place-items: center; font-size: 16px; }
  .brand .name { font-weight: 700; font-size: 16px; letter-spacing: -0.01em; }
  .brand .sub { font-size: 11px; color: var(--text-muted); }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 9px; cursor: pointer; color: var(--text-secondary); font-weight: 500; user-select: none; border: none; background: none; width: 100%; text-align: left; font-family: inherit; font-size: 14px; }
  .nav-item:hover { background: var(--accent-soft); color: var(--text-primary); }
  .nav-item.active { background: var(--series-1); color: #fff; }
  .nav-item .ico { width: 18px; text-align: center; }
  .nav-badge { margin-left: auto; font-size: 11px; background: var(--border); padding: 1px 7px; border-radius: 10px; color: var(--text-secondary); }
  .nav-item.active .nav-badge { background: rgba(255,255,255,0.25); color: #fff; }
  .sidebar-foot { margin-top: auto; font-size: 11px; color: var(--text-muted); padding: 8px; }

  .main { padding: 24px 28px 48px; min-width: 0; }
  .topbar { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; flex-wrap: wrap;
    position: sticky; top: 0; z-index: 20; background: var(--page);
    margin: -24px -28px 20px; padding: 16px 28px; border-bottom: 1px solid var(--border); }
  .topbar h1 { font-size: 22px; margin: 0; letter-spacing: -0.02em; }
  .topbar-controls { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; justify-content: flex-end; }
  select, .select-sm { font-family: inherit; font-size: 13px; padding: 7px 12px; border: 1px solid var(--border); border-radius: 9px; background: var(--surface-2); color: var(--text-primary); cursor: pointer; }
  .select-sm { font-size: 12.5px; padding: 6px 10px; border-radius: 8px; }
  .stale { font-size: 12px; color: var(--text-secondary); background: var(--surface-1); border: 1px solid var(--border); border-radius: 9px; padding: 6px 12px; display: inline-flex; align-items: center; gap: 8px; }
  .stale .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--good-mark); }

  .daterange { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .date-custom { display: flex; align-items: center; gap: 6px; margin-left: 2px; color: var(--text-muted); }
  .date-custom input[type=date] { font-family: inherit; font-size: 12.5px; padding: 6px 8px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface-2); color: var(--text-primary); }

  .kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 22px; }
  .tile { background: var(--surface-1); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; }
  .tile .label { font-size: 12.5px; color: var(--text-secondary); margin-bottom: 8px; }
  .tile .value { font-size: 26px; font-weight: 600; letter-spacing: -0.02em; }
  .tile .value .unit { font-size: 14px; font-weight: 500; color: var(--text-muted); margin-left: 2px; }
  .tile .delta { font-size: 12.5px; margin-top: 6px; display: flex; align-items: center; gap: 5px; }
  .delta.up { color: var(--good); } .delta.down { color: var(--critical); } .delta.flat { color: var(--text-muted); }

  .panel { background: var(--surface-1); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 20px; }
  .panel h2 { font-size: 15px; margin: 0 0 4px; }
  .panel .desc { font-size: 12.5px; color: var(--text-muted); margin: 0 0 16px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 1080px){ .grid-2 { grid-template-columns: 1fr; } .kpis { grid-template-columns: repeat(2,1fr);} }

  .range-note { font-size: 12px; color: var(--text-muted); margin: -8px 0 14px; }
  .filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .chip { font-size: 12.5px; padding: 6px 13px; border-radius: 20px; cursor: pointer; border: 1px solid var(--border); background: var(--surface-2); color: var(--text-secondary); user-select: none; }
  .chip:hover { background: var(--accent-soft); }
  .chip.active { background: var(--series-1); color: #fff; border-color: var(--series-1); }
  .search { flex: 1; min-width: 160px; }
  .search input { width: 100%; font-family: inherit; font-size: 13px; padding: 7px 12px; border: 1px solid var(--border); border-radius: 9px; background: var(--surface-2); color: var(--text-primary); }

  .pa { font-family: inherit; font-size: 13px; padding: 7px 12px; border: 1px solid var(--border); border-radius: 9px; background: var(--surface-2); color: var(--text-primary); }
  .pa:focus { outline: none; border-color: var(--series-1); box-shadow: 0 0 0 2px var(--accent-soft); }
  .party-row { display: grid; grid-template-columns: 170px repeat(3, 1fr); gap: 10px; align-items: center; margin-bottom: 8px; }
  .party-row .pname { font-size: 13px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pa { font-size: 12.5px; padding: 6px 10px; }
  .party-head { display: grid; grid-template-columns: 170px repeat(3, 1fr); gap: 10px; font-size: 11.5px; color: var(--text-muted); margin-bottom: 8px; font-weight: 600; }
  .party-table th.sortable { cursor: pointer; user-select: none; }
  .party-table th.sortable:hover { color: var(--text-secondary); }
  .party-table td { padding: 6px 8px; }
  .party-table td.pname-cell { font-size: 12.5px; color: var(--text-secondary); white-space: nowrap; font-weight: 500; }
  .party-table .pa { width: 100%; min-width: 90px; padding: 6px 8px; font-size: 12.5px; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--gridline); }
  th { color: var(--text-muted); font-weight: 600; font-size: 12px; white-space: nowrap; }
  tbody tr:hover { background: var(--accent-soft); }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .out { color: var(--critical); } .in { color: var(--good); }
  .pill { font-size: 11.5px; padding: 2px 9px; border-radius: 20px; background: var(--border); color: var(--text-secondary); display: inline-block; white-space: nowrap; }
  .pill.unclassified { background: rgba(250,178,25,0.20); color: #8a6100; }
  .pill.holder, .pill.attr { background: var(--accent-soft); color: var(--series-1); font-weight: 600; }
  @media (prefers-color-scheme: dark){ .pill.unclassified { color: var(--warning); } }
  .acc-alias { color: var(--text-muted); font-size: 12px; }
  .link { color: var(--series-1); cursor: pointer; border-bottom: 1px dashed rgba(42,120,214,0.45); }
  .link:hover { border-bottom-style: solid; }
  .tag-row { margin-top: 3px; display: flex; gap: 4px; flex-wrap: wrap; }

  .bars { display: flex; flex-direction: column; gap: 10px; }
  .bar-row { display: grid; grid-template-columns: 150px 1fr 90px; align-items: center; gap: 10px; font-size: 12.5px; }
  .bar-row .bname { color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar-track { background: var(--gridline); border-radius: 4px; height: 14px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--series-1); border-radius: 0 4px 4px 0; }
  .bar-val { text-align: right; font-variant-numeric: tabular-nums; color: var(--text-primary); }

  .cols { display: flex; align-items: flex-end; gap: 8px; height: 180px; padding-top: 10px; }
  .col-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; height: 100%; justify-content: flex-end; }
  .col { width: 24px; max-width: 60%; background: var(--series-2); border-radius: 4px 4px 0 0; }
  .col-cap { font-size: 11px; color: var(--text-secondary); font-variant-numeric: tabular-nums; }
  .col-x { font-size: 11px; color: var(--text-muted); }

  .empty { text-align: center; padding: 40px 20px; color: var(--text-muted); }
  .empty .big { font-size: 15px; color: var(--text-secondary); margin-bottom: 6px; }
  .foot-note { font-size: 12px; color: var(--text-muted); margin-top: 10px; display: flex; gap: 6px; align-items: flex-start; }
  a { color: var(--series-1); }

  /* modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: none; align-items: center; justify-content: center; z-index: 50; padding: 24px; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface-1); border: 1px solid var(--border); border-radius: 14px; max-width: 860px; width: 100%; max-height: 86vh; overflow: auto; box-shadow: 0 24px 70px rgba(0,0,0,0.35); }
  .modal-head { display: flex; align-items: flex-start; justify-content: space-between; padding: 18px 22px; border-bottom: 1px solid var(--gridline); position: sticky; top: 0; background: var(--surface-1); z-index: 1; }
  .modal-head h3 { margin: 0; font-size: 17px; }
  .modal-head .sub { font-size: 12.5px; color: var(--text-muted); margin-top: 4px; }
  .modal-close { border: none; background: var(--border); color: var(--text-primary); width: 30px; height: 30px; border-radius: 8px; cursor: pointer; font-size: 15px; }
  .modal-close:hover { background: var(--accent-soft); }
  .modal-body { padding: 18px 22px; }
  .modal-body h4 { font-size: 13px; margin: 0 0 8px; color: var(--text-secondary); }

  /* login */
  .login-screen { min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--page); }
  .login-box { background:var(--surface-1); border:1px solid var(--border); border-radius:14px; padding:32px 30px; width:100%; max-width:340px; }
  .login-box h1 { font-size:18px; margin:0 0 4px; }
  .login-box .sub { font-size:12.5px; color:var(--text-muted); margin:0 0 20px; }
  .login-box input { width:100%; font-family:inherit; font-size:13.5px; padding:10px 12px; border:1px solid var(--border); border-radius:9px; background:var(--surface-2); color:var(--text-primary); margin-bottom:10px; }
  .login-box button { width:100%; border:none; background:var(--series-1); color:#fff; border-radius:9px; padding:11px; font-family:inherit; font-size:13.5px; cursor:pointer; margin-top:4px; }
  .login-box button:disabled { opacity:0.6; cursor:default; }
  .login-box .err { color:var(--critical); font-size:12.5px; margin-top:10px; display:none; }

  /* chatbot */
  #chat-fab { position: fixed; right: 24px; bottom: 24px; width: 54px; height: 54px; border-radius: 50%; border: none; background: var(--series-1); color: #fff; font-size: 22px; cursor: pointer; box-shadow: 0 8px 24px rgba(0,0,0,0.28); z-index: 60; }
  #chat-fab:hover { filter: brightness(1.05); }
  .chat-win { position: fixed; right: 24px; bottom: 88px; width: 384px; max-width: calc(100vw - 32px); height: 540px; max-height: calc(100vh - 130px); background: var(--surface-1); border: 1px solid var(--border); border-radius: 14px; box-shadow: 0 24px 70px rgba(0,0,0,0.38); display: none; flex-direction: column; z-index: 60; overflow: hidden; }
  .chat-win.open { display: flex; }
  .chat-head { padding: 14px 16px; border-bottom: 1px solid var(--gridline); font-weight: 600; font-size: 14px; display: flex; justify-content: space-between; align-items: center; }
  .chat-head .sub2 { font-size: 11px; color: var(--text-muted); font-weight: 400; }
  .chat-head button { border: none; background: none; color: var(--text-muted); cursor: pointer; font-size: 15px; }
  .chat-body { flex: 1; overflow: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 88%; padding: 10px 13px; border-radius: 12px; font-size: 13px; line-height: 1.55; }
  .msg.user { align-self: flex-end; background: var(--series-1); color: #fff; border-bottom-right-radius: 4px; }
  .msg.bot { align-self: flex-start; background: var(--surface-2); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .msg .act { margin-top: 10px; }
  .msg .act button { font-family: inherit; font-size: 12px; padding: 6px 11px; border-radius: 8px; border: 1px solid var(--series-1); background: var(--accent-soft); color: var(--series-1); cursor: pointer; }
  .chat-mini { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 8px; }
  .chat-mini td { padding: 4px 6px; border-bottom: 1px solid var(--gridline); }
  .chat-mini td.n { text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .chat-input { display: flex; gap: 8px; padding: 12px; border-top: 1px solid var(--gridline); }
  .chat-input input { flex: 1; font-family: inherit; font-size: 13px; padding: 9px 12px; border: 1px solid var(--border); border-radius: 9px; background: var(--surface-2); color: var(--text-primary); }
  .chat-input button { border: none; background: var(--series-1); color: #fff; border-radius: 9px; padding: 0 14px; cursor: pointer; font-family: inherit; font-size: 13px; }
  .suggest { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .suggest .chip { font-size: 11.5px; }
</style>
</head>
<body>
<div id="login-screen" class="login-screen" style="display:none">
  <form class="login-box" id="login-form">
    <h1>Clobe 조회창</h1>
    <p class="sub">이름과 비밀번호로 로그인하세요</p>
    <input type="text" id="login-email" placeholder="이름" autocomplete="username" required>
    <input type="password" id="login-password" placeholder="비밀번호" autocomplete="current-password" required>
    <button type="submit">로그인</button>
    <p class="err" id="login-err"></p>
  </form>
</div>

<div class="app" style="display:none">
  <aside class="sidebar">
    <div class="brand"><div class="logo">C</div><div><div class="name">Clobe</div><div class="sub">조회창</div></div></div>
    <button class="nav-item active" data-view="overview"><span class="ico">▦</span> 개요</button>
    <button class="nav-item" data-view="account"><span class="ico">₩</span> 계좌 · 입출금<span class="nav-badge" id="badge-tx">0</span></button>
    <button class="nav-item" data-view="cards"><span class="ico">▤</span> 카드 내역<span class="nav-badge" id="badge-card">0</span></button>
    <button class="nav-item" data-view="tax"><span class="ico">▧</span> 세금계산서·매출</button>
    <button class="nav-item" data-view="manage"><span class="ico">⚙</span> 환경설정</button>
    <div class="sidebar-foot" id="current-user-email">© Clobe Viewer</div>
  </aside>

  <main class="main">
    <div class="topbar">
      <h1 id="view-title">개요</h1>
      <div class="topbar-controls">
        <div id="daterange" class="daterange"></div>
        <span class="stale"><span class="dot"></span> 동기화 상태 확인 중…</span>
        <select id="company-select"><option value="jnh">주식회사 제이앤에이취프레스</option></select>
        <button id="logout-btn" class="select-sm">로그아웃</button>
      </div>
    </div>
    <div id="content"></div>
  </main>
</div>
<div class="modal-overlay" id="modal"></div>

<button id="chat-fab" title="Clobe 어시스턴트">💬</button>
<div class="chat-win" id="chat-win">
  <div class="chat-head"><span>Clobe 어시스턴트 <span class="sub2">자연어 조회</span></span><button id="chat-close">✕</button></div>
  <div class="chat-body" id="chat-body"></div>
  <div class="chat-input"><input id="chat-text" placeholder="예: 어제 입출금 내역 알려줘" autocomplete="off"><button id="chat-send">전송</button></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="data.js"></script>
<script>
/* ============================================================
   clobe 실데이터 (Supabase) 연동. fetchX() 계열은 data.js 참고.
   ============================================================ */
const KRW = n => "₩" + Math.round(n).toLocaleString("ko-KR");
const compact = n => {
  const a = Math.abs(n);
  if (a >= 1e8) return "₩" + (n/1e8).toFixed(a>=1e9?0:1) + "억";
  if (a >= 1e4) return "₩" + Math.round(n/1e4).toLocaleString("ko-KR") + "만";
  return "₩" + Math.round(n).toLocaleString("ko-KR");
};

/* ---------- date range ---------- */
const TODAY = new Date();
const fmt = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
const HISTORY_START = (()=>{ const d=new Date(TODAY); d.setFullYear(d.getFullYear()-5); return fmt(d); })();
function presetRange(p){
  const end = fmt(TODAY); let s = new Date(TODAY);
  if (p==="today") {}
  else if (p==="7d")  s.setDate(s.getDate()-6);
  else if (p==="30d") s.setDate(s.getDate()-29);
  else if (p==="90d") s.setDate(s.getDate()-89);
  else if (p==="mtd") s = new Date(TODAY.getFullYear(), TODAY.getMonth(), 1);
  else if (p==="all") return { start: HISTORY_START, end };
  return { start: fmt(s), end };
}
let dateRange = Object.assign({ preset:"90d" }, presetRange("90d"));

/* ---------- lookups ----------
   cardHolders/acctAlias/partyAttrs는 data.js의 loadConfigCache()가 Supabase에서
   채우는 모듈 전역(let) — 여기서는 그대로 동기 조회만 한다. */
const sumBy = (arr, f) => arr.reduce((s,x)=>s+f(x),0);
const holderOf = card => cardHolders[card] || "";
const aliasOf = num => acctAlias[num] || accountNativeAlias[num] || "";
const attrOf = name => partyAttrs[name] || {};
const accNumOf = accStr => accStr.split(" ").pop();
const distinctAttr = k => [...new Set(Object.values(partyAttrs).map(a=>a[k]).filter(Boolean))];

/* ---------- render helpers ---------- */
const catPill = c => c ? `<span class="pill">${c}</span>` : `<span class="pill unclassified">미분류</span>`;
const drill = (type,key,inner) => `<span class="link" data-drill="${type}|${key}">${inner}</span>`;
const cardCell = card => `<span class="link" data-drill="card|${card}"><span class="pill">${card}</span>${holderOf(card)?` <span class="pill holder">${holderOf(card)}</span>`:""}</span>`;
function partyTags(name){
  const a = attrOf(name);
  const tags = [a.type,a.process,a.cost].filter(Boolean).map(v=>`<span class="pill attr">${v}</span>`).join("");
  return tags ? `<div class="tag-row">${tags}</div>` : "";
}
const emptyBox = (msg="관련 내역이 없습니다") => `<div class="empty"><div class="big">내역 없음</div>${msg}</div>`;
const rangeNote = () => `<div class="range-note">조회 기간: ${dateRange.start} ~ ${dateRange.end}</div>`;
const capNote = (list, cap=2000) => list.length>=cap ? `<div class="range-note" style="color:var(--warning)">⚠ 결과가 많아 최신 ${cap}건만 표시됩니다 — 기간을 좁혀보세요.</div>` : "";
const loadingHTML = () => `<div class="empty"><div class="big">불러오는 중…</div></div>`;
const errorHTML = err => `<div class="empty"><div class="big" style="color:var(--critical)">데이터를 불러오지 못했습니다</div>${err&&err.message?err.message:""}<div style="margin-top:12px"><button class="chip" onclick="VIEWS[currentView].fn()">다시 시도</button></div></div>`;

async function updateBadges(){
  const [txCount, cuCount, cbCount] = await Promise.all([
    countInRange("transactions","txn_at",dateRange),
    countInRange("card_billing_items","used_date",dateRange),

const modalEl = document.getElementById("modal");
async function openModal(type, key){
  modalEl.innerHTML = `<div class="modal"><div class="modal-head"><div><h3>불러오는 중…</h3></div></div></div>`;
  modalEl.classList.add("open");
  let title="", sub="", body="";
  try {
    if (type==="party"){
      const a = attrOf(key);
      const [tx, taxList] = await Promise.all([fetchTransactionsByParty(key), fetchTaxInvoicesByParty(key)]);
      const tags = [["거래유형",a.type],["공정",a.process],["비용유형",a.cost]].filter(x=>x[1]).map(x=>`<span class="pill attr">${x[0]}: ${x[1]}</span>`).join("");
      const info = [["사업자등록번호",a.regno],["대표자",a.ceo],["주소",a.addr]].filter(x=>x[1]);
      const infoHtml = info.length ? `<div style="margin-bottom:10px;font-size:12.5px;color:var(--text-secondary)">${info.map(x=>`<b>${x[0]}</b> ${x[1]}`).join(" · ")}</div>` : "";
      title = key; sub = `거래처 · 은행거래 ${tx.length}건 · 세금계산서 ${taxList.length}건 (최근 500건 기준)`;
      body = `${infoHtml}${tags?`<div class="tag-row" style="margin-bottom:14px">${tags}</div>`:""}
        ${(!info.length&&!tags)?`<p class="desc">속성 미지정 — '환경설정'에서 사업자등록번호·대표자·주소·거래유형 등을 입력할 수 있습니다.</p>`:""}
        ${tx.length?`<h4>은행 입출금</h4>${txTableHTML(tx)}`:""}
        ${taxList.length?`<h4 style="margin-top:18px">세금계산서</h4>${taxTableHTML(taxList)}`:""}
        ${(!tx.length&&!taxList.length)?emptyBox():""}`;
    } else if (type==="acct"){
      const [tx, accounts] = await Promise.all([fetchTransactionsByAccountNum(key), fetchAccounts()]);
      const bal = sumBy(accounts.filter(a=>a.num===key), a=>a.krw);
      title = `${key}${aliasOf(key)?` · ${aliasOf(key)}`:""}`;
      sub = `계좌 · 거래 ${tx.length}건(최근 500건) · 현재 잔액 ${KRW(bal)}`;
      body = tx.length ? txTableHTML(tx) : emptyBox();
    } else if (type==="card"){
      const [use, bill] = await Promise.all([fetchCardUsageByCard(key), fetchCardBillingByCard(key)]);
      title = `${key}${holderOf(key)?` · ${holderOf(key)}`:""}`;
      sub = `카드 · 이용 ${use.length}건 · 청구 ${bill.length}건 (최근 500건 기준)`;
      body = `${use.length?`<h4>이용내역</h4>${cardUsageTableHTML(use)}`:""}${bill.length?`<h4 style="margin-top:18px">청구내역</h4>${cardBillTableHTML(bill)}`:""}${(!use.length&&!bill.length)?emptyBox():""}`;
    }
    modalEl.innerHTML = `<div class="modal"><div class="modal-head"><div><h3>${title}</h3><div class="sub">${sub}</div></div><button class="modal-close" id="modal-x">✕</button></div><div class="modal-body">${body}</div></div>`;
    document.getElementById("modal-x").onclick = closeModal;
  } catch (err) {
    modalEl.innerHTML = `<div class="modal"><div class="modal-head"><div><h3>불러오기 실패</h3></div><button class="modal-close" id="modal-x">✕</button></div><div class="modal-body">${emptyBox("데이터를 불러오지 못했습니다: "+err.message)}</div></div>`;
    document.getElementById("modal-x").onclick = closeModal;
  }
}
function closeModal(){ modalEl.classList.remove("open"); modalEl.innerHTML=""; }
modalEl.onclick = e => { if (e.target===modalEl) closeModal(); };

/* 카드 사용자 매칭 / 계좌 별명 매칭 — 거래처 등록과 동일한 정렬 가능 테이블 패턴 */
let holderSort={key:"card",dir:1}, aliasSort={key:"num",dir:1};

function holderRows(cardsList, usageInRange){
  const rows = cardsList.map(card=>({ card, holder: holderOf(card), used: sumBy(usageInRange.filter(c=>c.card===card), c=>c.amount) }));
  const {key,dir} = holderSort;
  rows.sort((x,y)=>{ const xv=x[key], yv=y[key]; return typeof xv==="number" ? (xv-yv)*dir : String(xv).localeCompare(String(yv),"ko")*dir; });
  return rows;
}
function holderTable(cardsList, usageInRange){
  const cols = [["card","카드번호"],["holder","사용자"],["used","기간 이용액"]];
  const head = cols.map(([k,l])=>`<th class="sortable" data-sort="${k}">${l}${holderSort.key===k?(holderSort.dir>0?" ▲":" ▼"):""}</th>`).join("");
  const rows = holderRows(cardsList, usageInRange);
  const body = rows.map(r=>`<tr><td class="pname-cell">${r.card}</td><td><input class="pa" data-hcard="${r.card}" value="${r.holder}" placeholder="사용자 이름 입력"></td><td class="num">${KRW(r.used)}</td></tr>`).join("");
  return `<table class="party-table"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`;
}
function holderPanel(cardsList, usageInRange){
  return `<div class="panel"><h2>카드 사용자 매칭</h2><p class="desc">카드 번호에 사용자(소유자) 이름을 입력하면 모든 조회에 함께 표시·필터됩니다. 헤더를 클릭해 정렬할 수 있습니다. 자동 저장.</p>
    <div id="holder-wrap">${holderTable(cardsList, usageInRange)}</div></div>`;
}
function wireHolder(cardsList, usageInRange){
  const wrap = document.getElementById("holder-wrap");
  if (!wrap) return;
  const bind = () => {
    wrap.querySelectorAll("[data-sort]").forEach(h=>h.onclick=()=>{ const k=h.dataset.sort; if(holderSort.key===k) holderSort.dir*=-1; else holderSort={key:k,dir:1}; rerender(); });
    wrap.querySelectorAll("[data-hcard]").forEach(inp=>{
      inp.oninput=()=>{ cardHolders[inp.dataset.hcard]=inp.value.trim(); };

  bind();
}

function aliasRows(allAccounts){
  const nums = [...new Set(allAccounts.map(a=>a.num))];
  const rows = nums.map(num=>{
    const acc = allAccounts.find(a=>a.num===num);
    const bal = sumBy(allAccounts.filter(a=>a.num===num), a=>a.krw);
    return { num, bank: acc.bank, bal, alias: acctAlias[num]||"" };
  });
  const {key,dir} = aliasSort;
  rows.sort((x,y)=>{ const xv=x[key], yv=y[key]; return typeof xv==="number" ? (xv-yv)*dir : String(xv).localeCompare(String(yv),"ko")*dir; });
  return rows;
}
function aliasTable(allAccounts){
  const cols = [["num","계좌번호"],["bank","은행"],["bal","잔액"],["alias","별명"]];

}
function aliasPanel(allAccounts){

function partyRowsFiltered(){
  const q = partySearch.trim().toLowerCase();

  const {key,dir} = partySort;
  list.sort((x,y)=>{ const xv=key==="name"?x.p:(x.a[key]||""); const yv=key==="name"?y.p:(y.a[key]||""); return String(xv).localeCompare(String(yv),"ko")*dir; });
  return list;
}
function partyTable(){

    const end = dateRange.end;
    const todayStr = fmt(TODAY);
    const isSnapshot = end >= todayStr;
    const [accounts, loans, scope] = await Promise.all([
      fetchAccounts(), fetchLoans(), fetchTransactions(dateRange),
    ]);
    let afterEndTx = [];
    if (!isSnapshot) {
      const dayAfterEnd = fmt(new Date(new Date(end+"T00:00:00").getTime()+86400000));
      if (dayAfterEnd <= todayStr) afterEndTx = await fetchTransactions({start: dayAfterEnd, end: todayStr});
    }
    const curByNum = {}; accounts.forEach(a=>curByNum[a.num]=(curByNum[a.num]||0)+a.krw);
    const netAfterNum = num => sumBy(afterEndTx.filter(t=>accNumOf(t.acc)===num), t=>t.in - t.out);
    const asOfKrw = a => { const cur=curByNum[a.num]||0; const share=cur?a.krw/cur:0; return a.krw - netAfterNum(a.num)*share; };
    const rowsData = accounts.map(a=>({a, krw: isSnapshot ? a.krw : asOfKrw(a)}));
    const byType = {CHECKING:0,FUND:0,FX:0}; rowsData.forEach(r=>byType[r.a.type]=(byType[r.a.type]||0)+r.krw);
    const loanSum = sumBy(loans,l=>l.krw);
    const availableCash = sumBy(accounts, a=>a.krw);

    const accNums = [...new Set(scope.map(t=>accNumOf(t.acc)))];
    const match = t => txAccFilter==="ALL" || accNumOf(t.acc)===txAccFilter;
    const scoped = scope.filter(match);
    const inSum = sumBy(scoped,t=>t.in), outSum = sumBy(scoped,t=>t.out);
    let cur, netAfterEnd;
    if (txAccFilter==="ALL"){ cur=availableCash; netAfterEnd=sumBy(afterEndTx, t=>t.in-t.out); }
    else { cur=curByNum[txAccFilter]||0; netAfterEnd=netAfterNum(txAccFilter); }
    const closing = cur - netAfterEnd, opening = closing - (inSum - outSum);
    const scopeLabel = txAccFilter==="ALL" ? "전체 계좌" : (aliasOf(txAccFilter)||txAccFilter);

    const filtered = scoped.filter(t=>{
      const dirOk = txFilter==="ALL"||(txFilter==="IN"&&t.in)||(txFilter==="OUT"&&t.out)||(txFilter==="UNC"&&!t.cat);
      const q=txSearch.trim(); const a=attrOf(t.name);
      const searchOk = !q || (`${t.name} ${t.desc} ${t.cat||''} ${a.type||''} ${a.process||''} ${a.cost||''}`).toLowerCase().includes(q.toLowerCase());
      return dirOk && searchOk;
    });
    const accTabs = `<div class="filters" style="margin-bottom:14px"><span class="chip ${txAccFilter==='ALL'?'active':''}" data-txacc="ALL">전체 계좌</span>`+accNums.map(n=>`<span class="chip ${txAccFilter===n?'active':''}" data-txacc="${n}">${aliasOf(n)||n}</span>`).join("")+`</div>`;
    const balSorted = [...rowsData].sort((x,y)=>y.krw-x.krw);
    const maxBal = Math.max(1, ...balSorted.map(r=>r.krw));
    const balBars = balSorted.map(({a,krw})=>`<div class="bar-row"><div class="bname">${drill("acct",a.num,aliasOf(a.num)||a.name)} <span class="acc-alias">${a.bank}</span></div><div class="bar-track"><div class="bar-fill" style="width:${Math.max(2,krw/maxBal*100)}%"></div></div><div class="bar-val">${compact(krw)}</div></div>`).join("");
    const balRows = balSorted.map(({a,krw})=>{
      const changed = Math.round(krw)!==Math.round(a.krw);
      return `<tr><td>${a.bank}</td><td>${drill("acct",a.num,a.num)}<div class="acc-alias">${aliasOf(a.num)||a.name}</div></td>
        <td><span class="pill">${({CHECKING:"입출금",FUND:"펀드",FX:"외화"})[a.type]||a.type}</span></td>
        <td class="num">${a.cur!=="KRW"?`${a.cur} ${a.fx.toLocaleString("ko-KR")}`:"—"}</td>
        <td class="num">${KRW(krw)}${changed?`<div class="acc-alias">현재 ${compact(a.krw)}</div>`:""}</td></tr>`;
    }).join("");

    el.innerHTML = `
      <div class="kpis">
        <div class="tile"><div class="label">입출금 예금</div><div class="value">${compact(byType.CHECKING||0)}</div></div>
        <div class="tile"><div class="label">펀드</div><div class="value">${compact(byType.FUND||0)}</div></div>
        <div class="tile"><div class="label">외화예금 (원화환산)</div><div class="value">${compact(byType.FX||0)}</div></div>
        <div class="tile"><div class="label">대출 (부채)</div><div class="value" style="color:var(--critical)">${compact(loanSum)}</div></div>
      </div>
      <div class="kpis">
        <div class="tile"><div class="label">이월 잔액</div><div class="value">${compact(opening)}</div><div class="delta flat">${scopeLabel} · ~${dateRange.start}</div></div>
        <div class="tile"><div class="label">입금</div><div class="value" style="color:var(--good)">${compact(inSum)}</div><div class="delta flat">${scoped.filter(t=>t.in).length}건</div></div>
        <div class="tile"><div class="label">출금</div><div class="value" style="color:var(--critical)">${compact(outSum)}</div><div class="delta flat">${scoped.filter(t=>t.out).length}건</div></div>
        <div class="tile"><div class="label">기말 잔액</div><div class="value">${compact(closing)}</div><div class="delta flat">${scopeLabel} · ${end}</div></div>
      </div>
      <div class="panel"><h2>계좌 · 입출금 내역</h2><p class="desc">계좌 탭으로 계좌별 조회 · 거래처/계좌 클릭 시 상세 모달</p>${rangeNote()}${capNote(scope)}
        ${accTabs}
        <div class="filters">
          ${["ALL","IN","OUT","UNC"].map(f=>`<span class="chip ${txFilter===f?'active':''}" data-txf="${f}">${({ALL:"전체",IN:"입금",OUT:"출금",UNC:"미분류"})[f]}</span>`).join("")}
          <span class="search"><input id="tx-search" placeholder="거래처·적요·계정·거래유형 검색" value="${txSearch}"></span>
        </div>
        ${txTableHTML(filtered)}</div>
      <div class="panel"><h2>계좌별 잔액</h2><p class="desc">${isSnapshot?'최신 수집 시점 기준':`<b>${end}</b> 기준 추정(이후 거래 롤백)`} · 계좌 클릭 시 상세</p>
        <div class="bars" style="margin-bottom:18px">${balBars||emptyBox()}</div>
        <table><thead><tr><th>은행</th><th>계좌</th><th>구분</th><th class="num">외화잔액</th><th class="num">잔액(KRW)</th></tr></thead><tbody>${balRows}</tbody></table>
        <div class="foot-note">⚠️ 대출 ${compact(loanSum)}은 부채이며 자산 합계에서 제외됩니다.</div></div>`;
    document.querySelectorAll("[data-txacc]").forEach(c=>c.onclick=async ()=>{txAccFilter=c.dataset.txacc; await account();});
    document.querySelectorAll("[data-txf]").forEach(c=>c.onclick=async ()=>{txFilter=c.dataset.txf; await account();});
    const s=document.getElementById("tx-search");
    s.oninput=async e=>{ txSearch=e.target.value; const pos=e.target.selectionStart; await account(); const ns=document.getElementById("tx-search"); if(ns){ ns.focus(); ns.setSelectionRange(pos,pos); } };
  } catch (err) {
    el.innerHTML = errorHTML(err);
  }
}

let taxFilter="ALL";
/* ---------- 대사(reconciliation) 매칭 ---------- */
const normName = s => (s||"").replace(/\(주\)|주식회사|㈜|\s+/g,"").toLowerCase();
function matchInvoicesForTx(tx, invoices){
  const amt = tx.in || tx.out;
  const dir = tx.in ? "SALES" : "PURCHASE"; // 입금→매출계산서, 출금→매입계산서
  const txName = normName(tx.name);
  const txDate = tx.date.slice(0,10);
  return invoices.filter(inv=>inv.type===dir).map(inv=>{
    const amtOk = Math.abs((inv.supply+inv.vat) - amt) < 1;
    const invName = normName(inv.partner);
    const nameOk = !!(txName && invName && (txName.includes(invName) || invName.includes(txName)));
    const days = Math.abs((new Date(txDate) - new Date(inv.date))/86400000);
    return { inv, amtOk, nameOk, days };
  }).filter(m=>m.amtOk).sort((a,b)=> (b.nameOk-a.nameOk) || (a.days-b.days));
}
function matchTxForInvoice(inv, txs){
  const dir = inv.type; // SALES→입금, PURCHASE→출금
  const invName = normName(inv.partner);
  return txs.filter(t=> dir==="SALES" ? t.in : t.out).map(t=>{
    const amt = t.in || t.out;
    const amtOk = Math.abs(amt - (inv.supply+inv.vat)) < 1;
    const txName = normName(t.name);
    const nameOk = !!(txName && invName && (txName.includes(invName) || invName.includes(txName)));
    const days = Math.abs((new Date(t.date.slice(0,10)) - new Date(inv.date))/86400000);
    return { t, amtOk, nameOk, days };
  }).filter(m=>m.amtOk).sort((a,b)=> (b.nameOk-a.nameOk) || (a.days-b.days));
}
function reconResultHTML(kind, item, matches){
  if (!matches.length){
    return `<div class="foot-note" style="color:var(--critical)">⚠ 금액이 일치하는 ${kind==="tx"?"세금계산서":"입출금 내역"}를 현재 조회 기간 내에서 찾지 못했습니다. 기간을 넓혀보세요.</div>`;
  }
  const best = matches[0];
  const rows = matches.slice(0,5).map(m=>{
    if (kind==="tx") return [`${m.inv.partner} <span style="color:var(--text-muted)">${m.inv.date}</span>`, KRW(m.inv.supply+m.inv.vat)];
    return [`${m.t.name} <span style="color:var(--text-muted)">${m.t.date.slice(0,10)}</span>`, KRW(m.t.in||m.t.out)];
  });
  const okBadge = best.nameOk
    ? `<span class="pill" style="background:rgba(27,175,122,0.18);color:var(--good)">✓ 거래처·금액 일치</span>`
    : `<span class="pill unclassified">금액은 일치·거래처명 확인 필요</span>`;
  return `<div style="margin-top:8px">${okBadge}</div>${miniTable(rows)}`;
}

    const invPanelBody = list.length
      ? `<table><thead><tr><th>작성일</th><th>거래처</th><th>구분</th><th class="num">합계</th></tr></thead><tbody>${invRows}</tbody></table>`

        <div class="tile"><div class="label">순액 (매출−매입)</div><div class="value">${compact(salesSum-purchSum)}</div></div>

      <div class="grid-2">
        <div class="panel"><h2>은행 입출금</h2>${capNote(bankTx)}${txPanelBody}</div>
        <div class="panel"><h2>세금계산서 목록</h2>${capNote(base)}
          <div class="filters">${["ALL","SALES","PURCHASE"].map(f=>`<span class="chip ${taxFilter===f?'active':''}" data-txf2="${f}">${({ALL:"전체",SALES:"매출",PURCHASE:"매입"})[f]}</span>`).join("")}</div>

      </div>`;
    document.querySelectorAll("[data-txf2]").forEach(c=>c.onclick=async ()=>{taxFilter=c.dataset.txf2; await tax();});
    document.querySelectorAll("[data-recon]").forEach(row=>row.onclick=async ()=>{
      const [kind, idxStr] = row.dataset.recon.split("|");

    el.innerHTML = errorHTML(err);
  }
}

const chatWin = document.getElementById("chat-win");
const chatBody = document.getElementById("chat-body");
const chatText = document.getElementById("chat-text");

function parseChat(t){
  let range=null, rangeLabel="";
  const CUR_Y = TODAY.getFullYear(), CUR_M = TODAY.getMonth()+1;
  let prevM = CUR_M-1, prevY = CUR_Y; if (prevM===0){ prevM=12; prevY=CUR_Y-1; }
  const yesterday = new Date(TODAY); yesterday.setDate(yesterday.getDate()-1);
  const yStr = fmt(yesterday);
  const monthRange = (yr,m) => { const last=new Date(yr, m, 0).getDate(); const mm=String(m).padStart(2,"0"); return {start:`${yr}-${mm}-01`, end:`${yr}-${mm}-${String(last).padStart(2,"0")}`}; };
  const yearRange  = (yr) => ({ start:`${yr}-01-01`, end: yr>=CUR_Y ? fmt(TODAY) : `${yr}-12-31` });
  const ym = t.match(/(\d{4})\s*년\s*(\d{1,2})\s*월/);
  const yy = t.match(/(\d{4})\s*년/);
  if (/최근\s*7\s*일|지난\s*7\s*일|일주일/.test(t)) { range=presetRange("7d"); rangeLabel="최근 7일"; }
  else if (/최근\s*30\s*일/.test(t)) { range=presetRange("30d"); rangeLabel="최근 30일"; }
  else if (/최근\s*90\s*일/.test(t)) { range=presetRange("90d"); rangeLabel="최근 90일"; }
  else if (/어제|전일/.test(t)) { range={start:yStr,end:yStr}; rangeLabel=`어제(${yStr})`; }
  else if (/오늘|금일/.test(t)) { range=presetRange("today"); rangeLabel=`오늘(${fmt(TODAY)})`; }
  else if (/이번\s*달|당월|금월/.test(t)) { range=presetRange("mtd"); rangeLabel=`이번 달(${CUR_M}월)`; }
  else if (/지난\s*달|전월|저번\s*달/.test(t)) { range=monthRange(prevY,prevM); rangeLabel=`지난달(${prevM}월)`; }
  else if (ym) { range=monthRange(+ym[1], +ym[2]); rangeLabel=`${+ym[1]}년 ${+ym[2]}월`; }
  else if (yy) { range=yearRange(+yy[1]); rangeLabel=`${+yy[1]}년`; }
  else if (/올해|금년/.test(t)) { range=yearRange(CUR_Y); rangeLabel=`올해(${CUR_Y}년)`; }
  else if (/작년|지난해/.test(t)) { range=yearRange(CUR_Y-1); rangeLabel=`작년(${CUR_Y-1}년)`; }
  else { const m=t.match(/(\d{1,2})\s*월/); if(m){ range=monthRange(CUR_Y,+m[1]); rangeLabel=`${+m[1]}월`; } }
  if (!range){ range={start:dateRange.start,end:dateRange.end}; rangeLabel=`${range.start} ~ ${range.end}`; }

  let view=null;
  if (/카드.*(이용|사용|승인)|이용\s*내역/.test(t)) view="cardusage";
  else if (/카드.*청구|청구\s*내역/.test(t)) view="cardbilling";
  else if (/세금계산서|계산서|매출/.test(t)) view="tax";
  else if (/(잔액|계좌)/.test(t) && !/입출금|입금|출금|거래|이체/.test(t)) view="balance";
  else if (/입출금|입금|출금|거래|이체|내역/.test(t)) view="transactions";

  let dir="ALL";
  if (/출금|지출|나간|나감|송금|이체/.test(t) && !/입금/.test(t)) dir="OUT";
  else if (/입금|들어온|수금|매출\s*입금/.test(t) && !/출금/.test(t)) dir="IN";

  let taxType="ALL";
  if (view==="tax"){ if(/매출/.test(t)) taxType="SALES"; else if(/매입/.test(t)) taxType="PURCHASE"; }

  return { view, dir, taxType, range, rangeLabel };
}

function miniTable(rows){ // rows: [[left, right], ...]
  return `<table class="chat-mini">${rows.map(r=>`<tr><td>${r[0]}</td><td class="n">${r[1]}</td></tr>`).join("")}</table>`;
}

async function chatAnswer(q){
  if (!q.view) return { text:"무엇을 조회할지 이해하지 못했어요. 예를 들어 이렇게 물어보세요.", suggest:true };

  if (q.view==="balance"){
    const accounts = await fetchAccounts();
    const availableCash = sumBy(accounts, a=>a.krw);
    const top=[...accounts].sort((a,b)=>b.krw-a.krw).slice(0,5);
    return { text:`현재 총 가용 잔액은 <b>${compact(availableCash)}</b>입니다. (예금·펀드·외화, 대출 제외)`,
      html: miniTable(top.map(a=>[`${aliasOf(a.num)||a.name} <span style="color:var(--text-muted)">${a.bank}</span>`, KRW(a.krw)])),
      action:{view:"account"} };
  }
  if (q.view==="transactions"){
    let list = await fetchTransactions(q.range);
    if (q.dir==="OUT") list=list.filter(t=>t.out);
    else if (q.dir==="IN") list=list.filter(t=>t.in);
    const inC=list.filter(t=>t.in), outC=list.filter(t=>t.out);
    const inSum=sumBy(inC,t=>t.in), outSum=sumBy(outC,t=>t.out);
    const dw = q.dir==="OUT"?"출금":q.dir==="IN"?"입금":"입출금";
    if (!list.length) return { text:`${q.rangeLabel} ${dw} 내역이 없습니다.`, action:{view:"account",range:q.range,dir:q.dir} };
    const rows=list.slice(0,6).map(t=>[`${t.name} <span style="color:var(--text-muted)">${t.date.slice(5,10)}</span>`, (t.in?`<span style="color:var(--good)">+${KRW(t.in)}</span>`:`<span style="color:var(--critical)">−${KRW(t.out)}</span>`)]);
    let text=`${q.rangeLabel} ${dw} 결과입니다.<br>· 입금 ${inC.length}건 <b>${KRW(inSum)}</b><br>· 출금 ${outC.length}건 <b>${KRW(outSum)}</b><br>· 순증감 <b>${(inSum-outSum>=0?"+":"")+KRW(inSum-outSum)}</b>`;
    if (list.length>6) text+=`<br><span style="color:var(--text-muted)">상위 6건 표시 · 전체 ${list.length}건</span>`;
    return { text, html:miniTable(rows), action:{view:"account",range:q.range,dir:q.dir} };
  }
  if (q.view==="cardusage"){
    const list = await fetchCardUsage(q.range);
    if (!list.length) return { text:`${q.rangeLabel} 카드 이용내역이 없습니다.`, action:{view:"cards",cardTab:"usage",range:q.range} };
    const total=sumBy(list,c=>c.amount);
    const rows=list.slice(0,6).map(c=>[`${c.merchant} <span style="color:var(--text-muted)">${holderOf(c.card)||c.card}</span>`, KRW(c.amount)]);
    let text=`${q.rangeLabel} 카드 이용내역 <b>${list.length}건</b>, 합계 <b>${KRW(total)}</b>입니다.`;
    if (list.length>6) text+=`<br><span style="color:var(--text-muted)">상위 6건 표시</span>`;
    return { text, html:miniTable(rows), action:{view:"cards",cardTab:"usage",range:q.range} };
  }
  if (q.view==="cardbilling"){
    const list = await fetchCardBilling(q.range);
    if (!list.length) return { text:`${q.rangeLabel} 결제일 기준 카드 청구내역이 없습니다.`, action:{view:"cards",cardTab:"billing",range:q.range} };
    const total=sumBy(list,c=>c.amount);
    return { text:`${q.rangeLabel} 카드 청구 <b>${list.length}건</b>, 합계 <b>${KRW(total)}</b>입니다.`,
      html:miniTable(list.slice(0,6).map(c=>[`${c.merchant}`, KRW(c.amount)])), action:{view:"cards",cardTab:"billing",range:q.range} };
  }
  if (q.view==="tax"){
    let list = await fetchTaxInvoices(q.range);
    if (q.taxType!=="ALL") list=list.filter(t=>t.type===q.taxType);
    if (!list.length) return { text:`${q.rangeLabel} 세금계산서가 없습니다.`, action:{view:"tax",range:q.range,taxType:q.taxType} };
    const sales=sumBy(list.filter(t=>t.type==="SALES"),t=>t.supply+t.vat);
    const purch=sumBy(list.filter(t=>t.type==="PURCHASE"),t=>t.supply+t.vat);
    return { text:`${q.rangeLabel} 세금계산서입니다.<br>· 매출 <b>${KRW(sales)}</b><br>· 매입 <b>${KRW(purch)}</b><br>· 순액 <b>${KRW(sales-purch)}</b>`,
      html:miniTable(list.slice(0,6).map(t=>[`${t.partner} <span style="color:var(--text-muted)">${t.type==='SALES'?'매출':'매입'}</span>`, KRW(t.supply+t.vat)])),
      action:{view:"tax",range:q.range,taxType:q.taxType} };
  }
}

const SUGGESTIONS = ["어제 입출금 내역 알려줘","이번 달 카드 이용내역","이번 달 매출","계좌 잔액","최근 7일 출금"];
function addUser(text){
  const d=document.createElement("div"); d.className="msg user"; d.textContent=text;
  chatBody.appendChild(d); chatBody.scrollTop=chatBody.scrollHeight;
}
function addBot(res){
  const d=document.createElement("div"); d.className="msg bot";
  renderBotMsg(d, res);
  chatBody.appendChild(d);
  chatBody.scrollTop=chatBody.scrollHeight;
}
function renderBotMsg(d, res){
  let html=res.text||"";
  if (res.html) html+=res.html;
  if (res.suggest) html+=`<div class="suggest">${SUGGESTIONS.map(s=>`<span class="chip" data-sg="${s}">${s}</span>`).join("")}</div>`;
  if (res.action) html+=`<div class="act"><button>화면에서 자세히 보기 →</button></div>`;
  d.innerHTML=html;
  if (res.action){ const b=d.querySelector(".act button"); if(b) b.onclick=()=>applyChatAction(res.action); }
  d.querySelectorAll("[data-sg]").forEach(c=>c.onclick=()=>submitChat(c.dataset.sg));
}
async function applyChatAction(a){
  if (a.range){ dateRange={preset:"custom", start:a.range.start, end:a.range.end}; }
  if (a.view==="account"){ txFilter=a.dir||"ALL"; txSearch=""; txAccFilter="ALL"; }
  if (a.view==="cards"){ cardTab=a.cardTab||"usage"; cuCardFilter="ALL"; }
  if (a.view==="tax"){ taxFilter=a.taxType||"ALL"; }
  renderDateControl(); await updateBadges(); await go(a.view);
}
async function submitChat(text){
  const t=(text||chatText.value).trim(); if(!t) return;
  chatText.value="";
  addUser(t);
  const pending=document.createElement("div"); pending.className="msg bot"; pending.textContent="조회 중…";
  chatBody.appendChild(pending); chatBody.scrollTop=chatBody.scrollHeight;
  try {
    const res = await chatAnswer(parseChat(t));
    renderBotMsg(pending, res);
  } catch (err) {
    renderBotMsg(pending, { text: "조회 중 오류가 발생했습니다: " + err.message });
  }
  chatBody.scrollTop=chatBody.scrollHeight;
}
document.getElementById("chat-fab").onclick=()=>{
  chatWin.classList.toggle("open");
  if (chatWin.classList.contains("open")){
    if (!chatBody.childElementCount) addBot({text:"안녕하세요! 재무 데이터를 자연어로 조회해 드립니다. 이렇게 물어보세요.", suggest:true});
    chatText.focus();
  }
};
document.getElementById("chat-close").onclick=()=>chatWin.classList.remove("open");
document.getElementById("chat-send").onclick=()=>submitChat();
chatText.addEventListener("keydown", e=>{ if(e.key==="Enter") submitChat(); });

   AUTH GATE / BOOT
   ============================================================ */
async function showApp(session){
  document.querySelector(".app").style.display = "";
  document.getElementById("login-screen").style.display = "none";
  const emailEl = document.getElementById("current-user-email");
  if (emailEl) emailEl.textContent = session?.user?.user_metadata?.clobe_name || session?.user?.email || "";
  try {
    await loadConfigCache();
    const syncedAt = await loadSyncState();
    document.querySelector(".stale").innerHTML = syncedAt
      ? `<span class="dot"></span> 수집 ${isoToDisplayDateTime(syncedAt)}`
      : `<span class="dot" style="background:var(--warning)"></span> 아직 동기화되지 않음`;
  } catch (err) {
    document.querySelector(".stale").innerHTML = `<span class="dot" style="background:var(--critical)"></span> 설정 로드 실패: ${err.message}`;
  }
  renderDateControl();
  await updateBadges();
  await go("overview");
}
function showLoginScreen(){
  document.querySelector(".app").style.display = "none";
  document.getElementById("login-screen").style.display = "flex";
}
supabaseClient.auth.onAuthStateChange((_event, session) => {
  if (session) showApp(session); else showLoginScreen();
});
document.getElementById("login-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const email = document.getElementById("login-email").value.trim();
  const password = document.getElementById("login-password").value;
  const errEl = document.getElementById("login-err");
  const btn = e.target.querySelector("button[type=submit]");
  errEl.style.display = "none"; btn.disabled = true;
  const { error } = await signIn(email, password);
  btn.disabled = false;
  if (error) {
    errEl.style.color = "var(--critical)";
    errEl.textContent = "로그인 실패: 이메일 또는 비밀번호를 확인하세요.";
    errEl.style.display = "block";
  }
});
document.getElementById("logout-btn").onclick = () => signOut();
